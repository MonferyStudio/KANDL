  .spent-info { font-size: 11px; color: #666; }

  .controls span:hover { border-color: #4a4a5a; color: #aaa; }

  .canvas-wrap { flex: 1; overflow: hidden; position: relative; cursor: grab; }
  .canvas-wrap:active { cursor: grabbing; }
  .tree-canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
  svg.lines { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }

  /* Nodes */
  .node { position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; z-index: 2; transform: translate(-50%,-50%); }
  .node:hover { transform: translate(-50%,-50%) scale(1.2); z-index: 10; }
  .node.size-lg { width: 70px; height: 70px; font-size: 26px; }
  .node.size-md { width: 50px; height: 50px; font-size: 20px; }
  .node.size-sm { width: 40px; height: 40px; font-size: 16px; }
  .node.size-xs { width: 32px; height: 32px; font-size: 13px; }
  .node.size-xxs { width: 24px; height: 24px; font-size: 10px; }

  .node.locked { opacity: 0.15; cursor: not-allowed; }
  .node.available { opacity: 0.7; border: 2px solid #555; background: #181820; }
  .node.available:hover { opacity: 1; border-color: #999; }
  .node.bought { opacity: 1; box-shadow: 0 0 12px rgba(255,255,255,0.06); }

  /* Branch badges */
  .badge { position: absolute; transform: translate(-50%,-50%); padding: 6px 16px; border-radius: 22px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 7px; white-space: nowrap; z-index: 5; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; letter-spacing: 0.5px; }

  .badge.locked { opacity: 0.15; cursor: not-allowed; }
  .badge.available { opacity: 0.7; }
  .badge.available:hover { opacity: 1; }
  .badge.bought { opacity: 1; }

  .node.c-sectors.available { border: 2px solid #4a3a2a; background: #12100a; }
  .node.c-bots.bought { border: 2px solid #8a4aaa; background: #140a1a; }
  .node.c-bots.available { border: 2px solid #3a2a4a; background: #100a14; }
  .node.c-intel.bought { border: 2px solid #aa4a6a; background: #1a0a12; }
  .node.c-intel.available { border: 2px solid #4a2a3a; background: #140a10; }

  .node.c-tier1.bought { border: 2px solid #5a8aaa; background: #0a1520; }
  .node.c-tier1.available { border: 2px solid #2a3a4a; background: #080e14; }

  .node.c-tier3.available { border: 2px solid #4a2a1a; background: #120808; }

  .node.c-bonus-income.available { border: 2px solid #4a3a2a; background: #0e0e08; }

  .node-label { position: absolute; font-size: 8px; color: #555; text-align: center; width: 70px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; z-index: 1; transform: translate(-50%, 0); }

  .tooltip { display: none; position: fixed; background: #14141e; border: 1px solid #3a3a4a; border-radius: 8px; padding: 12px; z-index: 500; max-width: 250px; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }

  .tooltip .desc { font-size: 11px; color: #888; margin-bottom: 6px; line-height: 1.3; }

  .legend { position: fixed; bottom: 12px; left: 12px; z-index: 100; display: flex; gap: 10px; background: #0e0e16ee; padding: 8px 14px; border-radius: 6px; border: 1px solid #1a1a2a; font-size: 10px; backdrop-filter: blur(6px); flex-wrap: wrap; max-width: 600px; }

<script>
// ─── State ───
let pp = 500, spent = 0;
const bought = new Set();
const allNodes = [];
const allEdges = [];
let panX = 0, panY = 0, zoom = 0.55;

const CX = 2200, CY = 800;
const PAD = 80;

// ─── Sectors ───
const SECTORS = [
  {id:'tech',name:'Tech',icon:'\u{1F4BB}'},{id:'health',name:'Health',icon:'\u{1F3E5}'},{id:'finance',name:'Finance',icon:'\u{1F3E6}'},{id:'energy',name:'Energy',icon:'\u26A1'},
  {id:'consumer',name:'Consumer',icon:'\u{1F6D2}'},{id:'industrial',name:'Industry',icon:'\u{1F3ED}'},{id:'realestate',name:'Real Est.',icon:'\u{1F3E0}'},{id:'telecom',name:'Telecom',icon:'\u{1F4E1}'},
  {id:'materials',name:'Materials',icon:'\u{1FAA8}'},{id:'utilities',name:'Utilities',icon:'\u{1F4A1}'},{id:'gaming',name:'Gaming',icon:'\u{1F3AE}'},{id:'crypto',name:'Crypto',icon:'\u20BF'},
  {id:'aerospace',name:'Aero',icon:'\u{1F680}'},{id:'commodities',name:'Commod.',icon:'\u{1F6E2}\uFE0F'},{id:'forex',name:'Forex',icon:'\u{1F4B1}'},{id:'indices',name:'Indices',icon:'\u{1F4CA}'},
];

function addNode(id, x, y, icon, name, desc, effect, cost, color, size, req, badge) {
  allNodes.push({ id, x, y, icon, name, desc, effect, cost, color, size: size||'sm', req: req||null, badge: !!badge });
}
function addEdge(from, to, color) {
  allEdges.push({ from, to, color: color||'#2a2a3a' });
}

// ─── Branch builder helpers ───
function placeBranch(prefix, angle, colorClass, edgeColor, hubIcon, hubLabel, hubDesc, hubEffect, hubCost, spine, sides) {
  const hubDist = 90;
  const hx = CX + Math.cos(angle) * hubDist;
  const hy = CY + Math.sin(angle) * hubDist;

  addNode(prefix+'_hub', hx, hy, hubIcon, hubLabel, hubDesc, hubEffect, hubCost, colorClass, 'md', 'root', true);
  addEdge('root', prefix+'_hub', edgeColor);

  const spacing = 68;
  const spinePos = [];

  spine.forEach((n, i) => {
    const dist = hubDist + spacing * (i + 1);
    const x = CX + Math.cos(angle) * dist;
    const y = CY + Math.sin(angle) * dist;
    const req = i === 0 ? prefix+'_hub' : spine[i-1].id;
    addNode(n.id, x, y, n.icon, n.name, n.desc, n.effect, n.cost, colorClass, 'sm', req);
    addEdge(req, n.id, edgeColor);
    spinePos.push({ x, y, id: n.id });
  });

  (sides || []).forEach(s => {
    const fork = spinePos[s.from];
    if (!fork) return;
    const sideAngle = angle + s.dir * 0.65;
    const sideSpacing = 58;
    let prevId = fork.id;

    s.nodes.forEach((n, i) => {
      const d = sideSpacing * (i + 1);
      const x = fork.x + Math.cos(sideAngle) * d;
      const y = fork.y + Math.sin(sideAngle) * d;
      addNode(n.id, x, y, n.icon, n.name, n.desc, n.effect, n.cost, colorClass, 'xs', prevId);
      addEdge(prevId, n.id, edgeColor);
      prevId = n.id;
    });
  });
}

      { from: 1, dir: 1, nodes: [
        { id:'in_s2a', icon:'\u{1F4C8}', name:'Pattern Reader', desc:'Identify chart patterns', effect:'Show chart patterns', cost:15 },
        { id:'in_s2b', icon:'\u{1F4C8}', name:'Trend Spotter', desc:'Identify trends early', effect:'Early trend detection', cost:25 },
      ]},
      { from: 2, dir: -1, nodes: [
        { id:'in_s3a', icon:'\u{1F5C4}\uFE0F', name:'Data Mining', desc:'Auto-collect market data', effect:'Passive data income', cost:20 },
        { id:'in_s3b', icon:'\u{1F6E1}\uFE0F', name:'Counter Intel', desc:'Block bad news', effect:'Block 1 bad event/run', cost:35 },
      ]},
      { from: 3, dir: 1, nodes: [
        { id:'in_s4a', icon:'\u{1F4E3}', name:'Rumor Mill', desc:'Spread rumors to move prices', effect:'1 rumor/run', cost:25 },
        { id:'in_s4b', icon:'\u{1F9E9}', name:'Disinfo Shield', desc:'Immune to fake news', effect:'No fake news damage', cost:40 },
      ]},
    ]
  );

  // ═══ SECTORS (downward fan) ═══
  buildSectorFan();
}

function buildSectorFan() {
  // Sector hub badge
  const hubDist = 110;
  const hx = CX;
  const hy = CY + hubDist;
  addNode('sc_hub', hx, hy, '\u{1F310}', 'Sectors', 'Unlock sector specializations', 'Access all sector branches', 5, 'c-sectors', 'md', 'root', true);
  addEdge('root', 'sc_hub', '#3a2a1a');

  // Fan parameters
  const fanAngle = 2.6; // ~150 degrees total
  const startAngle = Math.PI/2 - fanAngle/2;
  const tierDists = [130, 210, 290];
  const bonusOffset = 35;
  const bonusPerp = 20;
  const capDist = 355;
  const tierCosts = [5, 12, 22];
  const tierColors = ['c-tier1', 'c-tier2', 'c-tier3'];

  SECTORS.forEach((sector, si) => {
    const angle = startAngle + (fanAngle / (SECTORS.length - 1)) * si;
    const perpAngle = angle + Math.PI / 2;

    let prevId = 'sc_hub';

    for (let t = 0; t < 3; t++) {
      const dist = tierDists[t];
      const tx = hx + Math.cos(angle) * dist;
      const ty = hy + Math.sin(angle) * dist;
      const tierId = `${sector.id}_t${t+1}`;
      const tierIcon = t === 0 ? sector.icon : '\u{1F513}';
      const tierName = t === 0 ? `${sector.name} T1` : `${sector.name} T${t+1}`;
      const tierDesc = t === 0 ? `Enter ${sector.name} sector & unlock Tier 1` : `Unlock Tier ${t+1} for ${sector.name}`;

      addNode(tierId, tx, ty, tierIcon, tierName, tierDesc, `Unlock T${t+1} stocks`, tierCosts[t], tierColors[t], t===0?'sm':'xs', prevId);
      addEdge(prevId, tierId, '#2a2218');

      // 3 bonus nodes branching perpendicular
      const bx0 = tx + Math.cos(angle) * bonusOffset;
      const by0 = ty + Math.sin(angle) * bonusOffset;
      const tier = t + 1;
      const bonuses = [
        { suf:'profit', icon:'\u{1F4C8}', name:'Boost', desc:`+${10+tier*5}% profits in ${sector.name}`, effect:`+${10+tier*5}% profit`, cost:4+tier*4, color:'c-bonus-profit' },
        { suf:'shield', icon:'\u{1F6E1}\uFE0F', name:'Shield', desc:`-${10+tier*5}% losses in ${sector.name}`, effect:`-${10+tier*5}% loss`, cost:4+tier*4, color:'c-bonus-loss' },
        { suf:'income', icon:'\u{1F4B5}', name:'Income', desc:`+$${20*tier}/day from ${sector.name}`, effect:`+$${20*tier}/day`, cost:4+tier*4, color:'c-bonus-income' },
      ];

      bonuses.forEach((b, bi) => {
        const perpOff = (bi - 1) * bonusPerp;
        const bx = bx0 + Math.cos(perpAngle) * perpOff;
        const by = by0 + Math.sin(perpAngle) * perpOff;
        const bId = `${sector.id}_t${tier}_${b.suf}`;
        addNode(bId, bx, by, b.icon, `${sector.name} ${b.name} ${tier}`, b.desc, b.effect, b.cost, b.color, 'xxs', tierId);
        addEdge(tierId, bId, '#2a2218');
      });

      prevId = tierId;
    }

    // Capstone
    const cx = hx + Math.cos(angle) * capDist;
    const cy = hy + Math.sin(angle) * capDist;
    addNode(`${sector.id}_cap`, cx, cy, '\u{1F48E}', `${sector.name} Mastery`, `Ultimate ${sector.name} specialization`, `2x all ${sector.name} bonuses`, 40, 'c-cap', 'sm', `${sector.id}_t3`);
    addEdge(`${sector.id}_t3`, `${sector.id}_cap`, '#3a1a1a');
  });
}

buildTree();

// ─── Logic ───
function isUnlocked(id) {
  const node = allNodes.find(n => n.id === id);
  if (!node) return false;
  if (!node.req) return true;
  return bought.has(node.req);
}
function getState(id) {
  if (bought.has(id)) return 'bought';
  if (isUnlocked(id)) return 'available';
  return 'locked';
}
function buyNode(id) {
  if (bought.has(id)) return;
  const node = allNodes.find(n => n.id === id);
  if (!node || !isUnlocked(id) || pp < node.cost) return;
  pp -= node.cost;
  spent += node.cost;
  bought.add(id);
  render();
}
function respec() {
  const loss = Math.floor(spent * 0.2);
  pp += spent - loss;
  spent = 0;
  bought.clear();
  render();
}

// ─── Rendering ───
function render() {
  document.getElementById('ppCount').textContent = pp;
  document.getElementById('spentPP').textContent = spent;

  const canvas = document.getElementById('treeCanvas');
  const svg = document.getElementById('linesSvg');

  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  allNodes.forEach(n => {
    minX = Math.min(minX, n.x - 60);
    minY = Math.min(minY, n.y - 60);
    maxX = Math.max(maxX, n.x + 60);
    maxY = Math.max(maxY, n.y + 60);
  });
  const W = maxX - minX + PAD*2;
  const H = maxY - minY + PAD*2;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `${minX-PAD} ${minY-PAD} ${W} ${H}`);

  // Edges
  let svgContent = '';
  allEdges.forEach(e => {
    const from = allNodes.find(n => n.id === e.from);
    const to = allNodes.find(n => n.id === e.to);
    if (!from || !to) return;
    const active = bought.has(e.from);
    const col = active ? e.color.replace(/1a/g,'5a').replace(/2a/g,'7a').replace(/3a/g,'9a') : e.color;
    const op = active ? 0.8 : 0.25;
    svgContent += `<line x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}" stroke="${col}" stroke-width="${active?2:1}" opacity="${op}"/>`;
  });
  svg.innerHTML = svgContent;

  // Nodes
  canvas.querySelectorAll('.node,.badge,.node-label').forEach(el => el.remove());

  allNodes.forEach(n => {
    const state = getState(n.id);
    const lx = n.x - minX + PAD;
    const ly = n.y - minY + PAD;

    if (n.badge) {
      // Render as pill badge
      const el = document.createElement('div');
      el.className = `badge ${n.color} ${state}`;
      el.style.left = lx + 'px';
      el.style.top = ly + 'px';
      el.textContent = n.icon + ' ' + n.name;
      el.onclick = () => buyNode(n.id);
      el.onmouseenter = (ev) => showTT(ev, n);
      el.onmouseleave = hideTT;
      canvas.appendChild(el);
    } else {
      // Circular node
      const el = document.createElement('div');
      el.className = `node size-${n.size} ${n.color} ${state}`;
      el.style.left = lx + 'px';
      el.style.top = ly + 'px';
      el.textContent = n.icon;
      el.onclick = () => buyNode(n.id);
      el.onmouseenter = (ev) => showTT(ev, n);
      el.onmouseleave = hideTT;
      canvas.appendChild(el);

      // Labels for sector T1 (entry) and capstones
      const isSectorT1 = n.id.match(/^[a-z]+_t1$/) && !n.id.startsWith('tr_') && !n.id.startsWith('df_') && !n.id.startsWith('bt_') && !n.id.startsWith('in_');
      if (isSectorT1 || n.id.endsWith('_cap')) {
        const lbl = document.createElement('div');
        lbl.className = 'node-label';
        lbl.style.left = lx + 'px';
        const off = n.size==='lg'?42:n.size==='md'?32:n.size==='sm'?26:20;
        lbl.style.top = (ly + off) + 'px';
        lbl.textContent = n.name;
        canvas.appendChild(lbl);
      }
    }
  });

  document.getElementById('statsInfo').textContent = `${allNodes.length} nodes \u00B7 ${bought.size} bought`;
  applyTransform();
}

// ─── Tooltip ───
function showTT(e, node) {
  const tt = document.getElementById('tooltip');
  const state = getState(node.id);
  let html = `<h4 style="color:${state==='bought'?'#6a6':'#ccc'}">${node.icon} ${node.name}</h4>`;
  html += `<div class="desc">${node.desc}</div>`;
  html += `<div class="effect">${node.effect}</div>`;
  if (state === 'bought') {
    html += `<div class="cost" style="color:#4a8a4a">\u2713 Purchased</div>`;
  } else {
    html += `<div class="cost" style="color:${pp>=node.cost?'#d4a843':'#8a3a3a'}">Cost: ${node.cost} PP</div>`;
    if (state === 'locked') {
      const reqNode = allNodes.find(n => n.id === node.req);
      html += `<div class="req">Requires: ${reqNode ? reqNode.name : '?'}</div>`;
    }
  }
  tt.innerHTML = html;
  tt.classList.add('show');
  positionTT(e);
}
function hideTT() { document.getElementById('tooltip').classList.remove('show'); }
function positionTT(e) {
  const tt = document.getElementById('tooltip');
  let x = e.clientX + 14, y = e.clientY - 8;
  const r = tt.getBoundingClientRect();
  if (x + r.width > window.innerWidth) x = e.clientX - r.width - 14;
  if (y + r.height > window.innerHeight) y = e.clientY - r.height;
  tt.style.left = x+'px'; tt.style.top = y+'px';
}
document.addEventListener('mousemove', e => {
  if (document.getElementById('tooltip').classList.contains('show')) positionTT(e);
});

// ─── Pan & Zoom ───
function applyTransform() {
  document.getElementById('treeCanvas').style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
}
const wrap = document.getElementById('canvasWrap');
let dragging = false, lastX, lastY;
wrap.addEventListener('mousedown', e => { if(e.button===0){ dragging=true; lastX=e.clientX; lastY=e.clientY; }});
window.addEventListener('mousemove', e => { if(dragging){ panX+=e.clientX-lastX; panY+=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY; applyTransform(); }});
window.addEventListener('mouseup', () => { dragging=false; });
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const oldZoom = zoom;
  const delta = e.deltaY > 0 ? -0.06 : 0.06;
  zoom = Math.max(0.15, Math.min(2.5, zoom + delta));
  // Zoom toward mouse
  panX = mx - (mx - panX) * (zoom / oldZoom);
  panY = my - (my - panY) * (zoom / oldZoom);
  applyTransform();
}, { passive: false });

function zoomIn() { zoom = Math.min(2.5, zoom + 0.12); applyTransform(); }
function zoomOut() { zoom = Math.max(0.15, zoom - 0.12); applyTransform(); }
function resetView() { zoom = 0.55; centerView(); }

function centerView() {
  const wrapRect = wrap.getBoundingClientRect();
  panX = wrapRect.width / 2 - CX * zoom;
  panY = 20;
  applyTransform();
}

render();
setTimeout(centerView, 50);
</script>
