<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Colony - Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

  /* Top bar */
  .resources { display: flex; gap: 16px; padding: 10px 16px; background: #12121a; border-bottom: 1px solid #2a2a3a; flex-wrap: wrap; }
  .res { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .res-icon { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
  .res-val { font-weight: bold; color: #fff; min-width: 40px; }
  .res-rate { color: #6a6; font-size: 11px; }
  .res-rate.negative { color: #a66; }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 220px; background: #0e0e16; border-right: 1px solid #2a2a3a; display: flex; flex-direction: column; }
  .sidebar h3 { padding: 12px; font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #1a1a2a; }
  .building-list { flex: 1; overflow-y: auto; padding: 8px; }
  .building-btn { width: 100%; padding: 10px; margin-bottom: 6px; background: #1a1a28; border: 1px solid #2a2a3a; border-radius: 6px; color: #e0e0e0; cursor: pointer; text-align: left; font-family: inherit; font-size: 12px; transition: all 0.15s; }
  .building-btn:hover { background: #252538; border-color: #4a4a6a; }
  .building-btn.selected { background: #1a2a1a; border-color: #4a8a4a; }
  .building-btn.locked { opacity: 0.35; cursor: not-allowed; }
  .building-btn .b-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .building-btn .b-name { font-weight: bold; font-size: 13px; }
  .building-btn .b-cost { color: #a88a4a; font-size: 11px; }
  .building-btn .b-desc { color: #777; font-size: 10px; line-height: 1.3; }

  /* Grid */
  .grid-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .grid { display: grid; gap: 2px; }
  .cell { width: 48px; height: 48px; background: #111118; border: 1px solid #1a1a25; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; transition: all 0.15s; position: relative; }
  .cell:hover { background: #1a1a28; border-color: #3a3a5a; }
  .cell.has-building { background: #151520; }
  .cell .level-dot { position: absolute; bottom: 2px; right: 3px; font-size: 8px; color: #666; }
  .cell.highlight { background: #1a2a1a; border-color: #4a8a4a; }

  /* Info panel */
  .info-panel { width: 240px; background: #0e0e16; border-left: 1px solid #2a2a3a; padding: 12px; overflow-y: auto; }
  .info-panel h3 { font-size: 14px; margin-bottom: 8px; color: #ccc; }
  .info-panel .info-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px solid #1a1a25; }
  .info-panel .info-label { color: #888; }
  .info-panel .info-value { color: #fff; }
  .info-section { margin-bottom: 16px; }
  .info-section h4 { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }

  /* Bottom bar */
  .bottom-bar { padding: 8px 16px; background: #12121a; border-top: 1px solid #2a2a3a; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
  .tick-info { color: #666; }
  .pop-info { color: #8a8aaa; }

  /* Animations */
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  .producing { animation: pulse 1.5s infinite; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }

  /* Connection lines */
  .connection-hint { color: #4a4a6a; font-size: 10px; margin-top: 8px; padding: 8px; background: #111118; border-radius: 4px; line-height: 1.4; }
</style>
</head>
<body>

<div class="resources" id="resources"></div>

<div class="main">
  <div class="sidebar">
    <h3>Buildings</h3>
    <div class="building-list" id="buildingList"></div>
  </div>

  <div class="grid-container">
    <div class="grid" id="grid"></div>
  </div>

  <div class="info-panel" id="infoPanel">
    <div class="info-section">
      <h3>Grid Colony</h3>
      <p style="font-size:11px;color:#666;line-height:1.5;">Click a building on the left, then click a cell to place it. Buildings produce resources over time. Chain them together for automation.</p>
      <div class="connection-hint">
        Tip: Place buildings adjacent to their input source for a 25% speed bonus.
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div class="tick-info">Tick: <span id="tickCount">0</span></div>
  <div>Population: <span id="popCount">5</span> | Power: <span id="powerCount">0</span>/<span id="powerNeed">0</span></div>
  <div class="pop-info">Day <span id="dayCount">1</span></div>
</div>

<script>
const GRID_SIZE = 10;
const TICK_MS = 1000;

const resources = {
  wood:    { amount: 30, rate: 0, icon: '#4a8a3a', name: 'Wood' },
  stone:   { amount: 20, rate: 0, icon: '#8a8a8a', name: 'Stone' },
  iron:    { amount: 0,  rate: 0, icon: '#7a6a5a', name: 'Iron' },
  coal:    { amount: 0,  rate: 0, icon: '#3a3a3a', name: 'Coal' },
  steel:   { amount: 0,  rate: 0, icon: '#5a7a9a', name: 'Steel' },
  energy:  { amount: 10, rate: 0, icon: '#aa8a2a', name: 'Energy' },
  food:    { amount: 15, rate: 0, icon: '#8a4a2a', name: 'Food' },
  bricks:  { amount: 0,  rate: 0, icon: '#9a4a3a', name: 'Bricks' },
};

const buildings = [
  { id: 'lumberjack', name: 'Lumberjack', icon: '🪓', cost: { wood: 5 }, produces: { wood: 2 }, consumes: {}, desc: 'Chops wood from nearby forests', power: 0, unlocked: true },
  { id: 'quarry', name: 'Quarry', icon: '⛏️', cost: { wood: 10 }, produces: { stone: 1.5 }, consumes: {}, desc: 'Extracts stone from the ground', power: 0, unlocked: true },
  { id: 'farm', name: 'Farm', icon: '🌾', cost: { wood: 8 }, produces: { food: 2 }, consumes: {}, desc: 'Grows food for your population', power: 0, unlocked: true },
  { id: 'mine', name: 'Iron Mine', icon: '🏗️', cost: { wood: 15, stone: 10 }, produces: { iron: 1 }, consumes: {}, desc: 'Deep mine that extracts iron ore', power: 1, unlocked: false, req: { stone: 30 } },
  { id: 'coalmine', name: 'Coal Mine', icon: '🕳️', cost: { wood: 12, stone: 8 }, produces: { coal: 1.5 }, consumes: {}, desc: 'Extracts coal for fuel and smelting', power: 0, unlocked: false, req: { stone: 20 } },
  { id: 'smelter', name: 'Smelter', icon: '🔥', cost: { stone: 20, wood: 10 }, produces: { steel: 1 }, consumes: { iron: 1, coal: 1 }, desc: 'Iron + Coal = Steel', power: 2, unlocked: false, req: { iron: 5 } },
  { id: 'brickworks', name: 'Brick Works', icon: '🧱', cost: { stone: 15, wood: 5 }, produces: { bricks: 1.5 }, consumes: { stone: 1, coal: 0.5 }, desc: 'Stone + Coal = Bricks', power: 1, unlocked: false, req: { coal: 5 } },
  { id: 'generator', name: 'Generator', icon: '⚡', cost: { stone: 15, iron: 5 }, produces: { energy: 5 }, consumes: { coal: 1 }, desc: 'Burns coal to produce energy', power: -5, unlocked: false, req: { coal: 5 } },
  { id: 'house', name: 'House', icon: '🏠', cost: { wood: 20, stone: 10 }, produces: {}, consumes: { food: 1 }, desc: '+3 population capacity', power: 0, unlocked: true, pop: 3 },
  { id: 'warehouse', name: 'Warehouse', icon: '📦', cost: { wood: 25, bricks: 10 }, produces: {}, consumes: {}, desc: 'Adjacent buildings +50% output', power: 0, unlocked: false, req: { bricks: 5 }, aura: 'output' },
];

let grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(null));
let selectedBuilding = null;
let tickCount = 0;
let population = 5;
let maxPop = 5;
let totalPower = 0;
let usedPower = 0;

function canAfford(cost) {
  return Object.entries(cost).every(([r, amt]) => resources[r].amount >= amt);
}

function payCost(cost) {
  Object.entries(cost).forEach(([r, amt]) => resources[r].amount -= amt);
}

function checkUnlocks() {
  buildings.forEach(b => {
    if (!b.unlocked && b.req) {
      b.unlocked = Object.entries(b.req).every(([r, amt]) => resources[r].amount >= amt);
    }
  });
}

function getAdjacentBuildings(r, c) {
  const adj = [];
  [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc]) => {
    const nr = r+dr, nc = c+dc;
    if (nr>=0 && nr<GRID_SIZE && nc>=0 && nc<GRID_SIZE && grid[nr][nc]) {
      adj.push(grid[nr][nc]);
    }
  });
  return adj;
}

function hasAdjacentInput(r, c, building) {
  if (!building.consumes || Object.keys(building.consumes).length === 0) return false;
  const adj = getAdjacentBuildings(r, c);
  const needed = Object.keys(building.consumes);
  return needed.some(res => adj.some(a => a.def.produces[res]));
}

function hasAdjacentWarehouse(r, c) {
  return getAdjacentBuildings(r, c).some(a => a.def.aura === 'output');
}

function tick() {
  tickCount++;

  // Reset rates
  Object.values(resources).forEach(r => r.rate = 0);
  totalPower = 0;
  usedPower = 0;

  // Process buildings
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = grid[r][c];
      if (!cell) continue;
      const def = cell.def;

      // Check if can consume
      let canProduce = true;
      if (def.consumes) {
        for (const [res, amt] of Object.entries(def.consumes)) {
          if (resources[res].amount < amt) { canProduce = false; break; }
        }
      }

      // Power check
      if (def.power > 0) {
        usedPower += def.power;
      } else if (def.power < 0) {
        totalPower += Math.abs(def.power);
      }

      cell.producing = canProduce;
      if (!canProduce) continue;

      // Consume
      if (def.consumes) {
        Object.entries(def.consumes).forEach(([res, amt]) => {
          resources[res].amount -= amt;
          resources[res].rate -= amt;
        });
      }

      // Adjacency bonus
      let bonus = 1;
      if (hasAdjacentInput(r, c, def)) bonus += 0.25;
      if (hasAdjacentWarehouse(r, c)) bonus += 0.50;

      // Produce
      if (def.produces) {
        Object.entries(def.produces).forEach(([res, amt]) => {
          const produced = amt * bonus;
          resources[res].amount += produced;
          resources[res].rate += produced;
        });
      }

      // Food consumption for houses
      if (def.consumes && def.consumes.food) {
        // already handled above
      }
    }
  }

  // Population
  maxPop = 5;
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (grid[r][c] && grid[r][c].def.pop) maxPop += grid[r][c].def.pop;
    }
  }

  checkUnlocks();
  render();
}

function render() {
  // Resources
  const resEl = document.getElementById('resources');
  resEl.innerHTML = Object.entries(resources)
    .filter(([k,v]) => v.amount > 0 || v.rate !== 0 || ['wood','stone','food','energy'].includes(k))
    .map(([k, v]) => {
      const rateStr = v.rate > 0 ? `+${v.rate.toFixed(1)}` : v.rate < 0 ? v.rate.toFixed(1) : '';
      const rateClass = v.rate >= 0 ? '' : 'negative';
      return `<div class="res">
        <span class="res-icon" style="background:${v.icon}"></span>
        <span class="res-val">${Math.floor(v.amount)}</span>
        <span style="color:#888;font-size:11px">${v.name}</span>
        ${rateStr ? `<span class="res-rate ${rateClass}">${rateStr}/s</span>` : ''}
      </div>`;
    }).join('');

  // Building list
  const listEl = document.getElementById('buildingList');
  listEl.innerHTML = buildings.map(b => {
    const costStr = Object.entries(b.cost).map(([r,a]) => `${a} ${r}`).join(', ');
    const affordable = canAfford(b.cost);
    const sel = selectedBuilding === b.id ? 'selected' : '';
    const locked = !b.unlocked ? 'locked' : '';
    return `<button class="building-btn ${sel} ${locked}" onclick="selectBuilding('${b.id}')" ${!b.unlocked ? 'disabled' : ''}>
      <div class="b-header">
        <span class="b-name">${b.icon} ${b.name}</span>
      </div>
      <div class="b-cost" style="color:${affordable ? '#a88a4a' : '#8a3a3a'}">${costStr}${b.power > 0 ? ' ⚡'+b.power : ''}</div>
      <div class="b-desc">${b.unlocked ? b.desc : '???'}</div>
    </button>`;
  }).join('');

  // Grid
  const gridEl = document.getElementById('grid');
  gridEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 48px)`;
  gridEl.innerHTML = '';
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (grid[r][c]) {
        cell.classList.add('has-building');
        if (grid[r][c].producing) cell.classList.add('producing');
        cell.innerHTML = grid[r][c].def.icon;
        cell.title = grid[r][c].def.name;
      }
      cell.addEventListener('click', () => placeBuilding(r, c));
      cell.addEventListener('contextmenu', (e) => { e.preventDefault(); showCellInfo(r, c); });
      // Highlight valid placement
      if (selectedBuilding && !grid[r][c]) {
        cell.classList.add('highlight');
      }
      gridEl.appendChild(cell);
    }
  }

  // Bottom bar
  document.getElementById('tickCount').textContent = tickCount;
  document.getElementById('popCount').textContent = `${population}/${maxPop}`;
  document.getElementById('powerCount').textContent = totalPower;
  document.getElementById('powerNeed').textContent = usedPower;
  document.getElementById('dayCount').textContent = Math.floor(tickCount / 60) + 1;
}

function selectBuilding(id) {
  selectedBuilding = selectedBuilding === id ? null : id;
  render();
}

function placeBuilding(r, c) {
  if (!selectedBuilding || grid[r][c]) return;
  const def = buildings.find(b => b.id === selectedBuilding);
  if (!def || !def.unlocked || !canAfford(def.cost)) return;

  payCost(def.cost);
  grid[r][c] = { def, producing: false };
  // Don't deselect — let player place multiples
  render();
  showCellInfo(r, c);
}

function showCellInfo(r, c) {
  const panel = document.getElementById('infoPanel');
  const cell = grid[r][c];
  if (!cell) {
    panel.innerHTML = `<div class="info-section">
      <h3>Empty Cell</h3>
      <p style="font-size:11px;color:#666;">Select a building and click to place it here.</p>
      <p style="font-size:11px;color:#555;margin-top:8px;">Position: ${r}, ${c}</p>
    </div>`;
    return;
  }

  const def = cell.def;
  const adj = getAdjacentBuildings(r, c);
  const hasInput = hasAdjacentInput(r, c, def);
  const hasWH = hasAdjacentWarehouse(r, c);
  let bonus = 1 + (hasInput ? 0.25 : 0) + (hasWH ? 0.50 : 0);

  let html = `<div class="info-section">
    <h3>${def.icon} ${def.name}</h3>
    <p style="font-size:11px;color:#666;margin-bottom:8px;">${def.desc}</p>`;

  if (Object.keys(def.produces).length > 0) {
    html += `<h4>Production</h4>`;
    Object.entries(def.produces).forEach(([res, amt]) => {
      html += `<div class="info-row"><span class="info-label">${resources[res].name}</span><span class="info-value" style="color:#6a6">+${(amt*bonus).toFixed(1)}/s</span></div>`;
    });
  }

  if (def.consumes && Object.keys(def.consumes).length > 0) {
    html += `<h4>Consumption</h4>`;
    Object.entries(def.consumes).forEach(([res, amt]) => {
      html += `<div class="info-row"><span class="info-label">${resources[res].name}</span><span class="info-value" style="color:#a66">-${amt.toFixed(1)}/s</span></div>`;
    });
  }

  if (def.pop) {
    html += `<h4>Housing</h4><div class="info-row"><span class="info-label">Capacity</span><span class="info-value">+${def.pop}</span></div>`;
  }

  html += `<h4>Bonuses</h4>`;
  html += `<div class="info-row"><span class="info-label">Adjacency</span><span class="info-value" style="color:${hasInput?'#6a6':'#666'}">${hasInput ? '+25%' : 'None'}</span></div>`;
  html += `<div class="info-row"><span class="info-label">Warehouse</span><span class="info-value" style="color:${hasWH?'#aa6':'#666'}">${hasWH ? '+50%' : 'None'}</span></div>`;
  html += `<div class="info-row"><span class="info-label">Total</span><span class="info-value">${Math.round(bonus*100)}%</span></div>`;

  html += `<h4>Neighbors (${adj.length})</h4>`;
  adj.forEach(a => {
    html += `<div class="info-row"><span class="info-label">${a.def.icon} ${a.def.name}</span><span class="info-value" style="color:#555">${a.producing ? 'Active' : 'Idle'}</span></div>`;
  });

  html += `</div>`;
  panel.innerHTML = html;
}

// Init
render();
setInterval(tick, TICK_MS);
</script>
</body>
</html>
